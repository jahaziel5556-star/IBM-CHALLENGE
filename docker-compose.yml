version: "3.9"

services:
  backend:
    build:
      context: ./backend
    environment:
      MATCHMIND_ENV: development
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      IBM_WATSONX_USE_MOCK: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
