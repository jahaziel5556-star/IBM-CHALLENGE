services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: matchmind_one
      POSTGRES_USER: matchmind
      POSTGRES_PASSWORD: matchmind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchmind -d matchmind_one"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    environment:
      MATCHMIND_ENV: development
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      DATABASE_URL: postgresql+psycopg://matchmind:matchmind@postgres:5432/matchmind_one
      DATABASE_AUTO_INIT: "false"
      SEED_DEMO_DATA: "true"
      IBM_WATSONX_USE_MOCK: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
