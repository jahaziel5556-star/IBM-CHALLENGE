name: MatchMind CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run end-to-end demo validation
        working-directory: frontend
        run: npm run test:e2e

  watsonx-live-check:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Check watsonx secret availability
        id: watsonx-secrets
        env:
          IBM_WATSONX_API_KEY: ${{ secrets.IBM_WATSONX_API_KEY }}
          IBM_WATSONX_PROJECT_ID: ${{ secrets.IBM_WATSONX_PROJECT_ID }}
        run: |
          if [ -n "$IBM_WATSONX_API_KEY" ] && [ -n "$IBM_WATSONX_PROJECT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip live watsonx verification when secrets are missing
        if: ${{ steps.watsonx-secrets.outputs.available != 'true' }}
        run: echo "Skipping live watsonx verification because IBM secrets are not configured."

      - name: Verify live watsonx integration
        if: ${{ steps.watsonx-secrets.outputs.available == 'true' }}
        env:
          IBM_WATSONX_API_KEY: ${{ secrets.IBM_WATSONX_API_KEY }}
          IBM_WATSONX_PROJECT_ID: ${{ secrets.IBM_WATSONX_PROJECT_ID }}
          IBM_WATSONX_URL: ${{ secrets.IBM_WATSONX_URL }}
          IBM_WATSONX_MODEL_ID: ${{ secrets.IBM_WATSONX_MODEL_ID }}
          IBM_WATSONX_API_VERSION: ${{ secrets.IBM_WATSONX_API_VERSION }}
          IBM_WATSONX_USE_MOCK: "false"
        run: python scripts/verify-watsonx-live.py
